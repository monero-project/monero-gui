name: Dinastycoin Linux Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Costruzione Immagine e AppImage (Docker)
        run: |
          # Esegue tutto il Dockerfile (compilazione + creazione AppImage)
          docker build --tag dinasty-build --file Dockerfile.linux .

      - name: Estrai AppImage e genera Checksum
        run: |
          # Creiamo il container, copiamo il file e puliamo subito
          docker create --name temp-container dinasty-build
          docker cp temp-container:/dinastycoin-gui/Dinastycoin_Wallet_GUI-x86_64.AppImage ./Dinastycoin_Wallet_GUI-x86_64.AppImage
          docker rm temp-container
          
          # Genera il file SHA-256 per la verifica
          sha256sum Dinastycoin_Wallet_GUI-x86_64.AppImage > Dinastycoin_Wallet_GUI-x86_64.AppImage.sha256

      - name: Carica AppImage e Checksum su GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Dinastycoin-AppImage-Package
          path: |
            ./Dinastycoin_Wallet_GUI-x86_64.AppImage
            ./Dinastycoin_Wallet_GUI-x86_64.AppImage.sha256
