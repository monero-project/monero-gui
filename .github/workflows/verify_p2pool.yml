name: ci/gh-actions/verify
on: 
  push:
    paths:
      - 'src/p2pool/P2PoolManager.cpp'
  pull_request:
    paths:
      - 'src/p2pool/P2PoolManager.cpp'
jobs:
  p2pool-hashes:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v7
    - name: Verify Hashes
      run: |
        python3 .github/verify_p2pool.py
